<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የውድድር ውጤት መያዣ - Delu</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        #login-box { width: 350px; margin: 100px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        .in-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #1a2a6c; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #main-app { display: none; max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #2c3e50; color: white; font-size: 13px; }
        .btn-check { cursor: pointer; font-weight: bold; font-size: 22px; height: 45px; display: flex; align-items: center; justify-content: center; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .correct { background-color: #e8f5e9 !important; color: #27ae60; border-color: #27ae60; }
        .wrong { background-color: #ffebee !important; color: #e74c3c; border-color: #e74c3c; }
        .footer { display: flex; justify-content: space-between; margin-top: 30px; padding: 20px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; }
        @media print { .no-print { display: none; } #main-app { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>

<div id="login-box">
    <h2 style="color:#1a2a6c">የውድድር መግቢያ</h2>
    <input type="text" id="uField" class="in-field" placeholder="Username">
    <input type="password" id="pField" class="in-field" placeholder="Password">
    <p id="err" style="color:red; display:none;">ያልተፈቀደ ሙከራ!</p>
    <button class="btn-login" onclick="validate()">ግባ</button>
</div>

<div id="main-app">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 style="color:#1a2a6c">የጥያቄና መልስ ውጤት መያዣ</h2>
        <div id="clock" style="font-weight:bold; color:#444;"></div>
        <button class="no-print" onclick="location.reload()" style="background:#fdecea; border:1px solid #f5c6cb; padding:5px 10px; cursor:pointer; border-radius:5px;">ውጣ</button>
    </div>

    <div class="header-top">
        <div>ቀን፡ <span id="date" style="font-weight:bold;"></span></div>
        <div>ክፍል፡ <select id="selGrade"><option>1ኛሀ</option><option>1ኛለ</option><option>2ኛሀ</option><option>3ኛሀ</option></select></div>
        <div>ሴሚስተር፡ <select id="selSem"><option>1ኛ</option><option selected>2ኛ</option></select></div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2">ተ.ቁ</th><th rowspan="2" style="width:180px">ተማሪ ስም</th>
                <th colspan="2">አማርኛ</th><th colspan="2">እንግሊዝኛ</th><th colspan="2">ሒሳብ</th><th colspan="2">አ/ሳይንስ</th><th colspan="2">ግብረገብ</th>
                <th rowspan="2">✓</th><th rowspan="2">X</th><th rowspan="2">ድምር</th><th rowspan="2">ደረጃ</th>
            </tr>
            <tr><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th></tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

    <div style="text-align:center; margin-top:25px;" class="no-print">
        <button onclick="save()" style="background:#27ae60; color:white; padding:12px 25px; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">💾 ውጤቱን መዝግብ</button>
        <button onclick="window.print()" style="background:#34495e; color:white; padding:12px 25px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-left:10px;">🖨️ ውጤቱን አትም</button>
    </div>

    <div id="history" style="display:none; margin-top:30px; border-top:1px dashed #ccc; padding-top:20px;">
        <table id="hTable"><thead><tr><th>ክፍል</th><th>ስም</th><th>ውጤት</th><th>ደረጃ</th></tr></thead><tbody></tbody></table>
    </div>

    <div class="footer">
        <div>
            <h4 style="color:#1a2a6c;">የውድድሩ ዳኞች</h4>
            1ኛ፡ <select class="jList" style="width:180px; padding:5px;"></select><br><br>
            2ኛ፡ <select class="jList" style="width:180px; padding:5px;"></select>
        </div>
        <div style="text-align:right;">
            <p>ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b></p>
            <p>ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b></p>
            <p>ፊርማ፡ _________________</p>
        </div>
    </div>
</div>

<script>
    // Security: Encoded credentials
    const _0x1 = "RGVsdQ=="; // Username: Delu
    const _0x2 = "MTIyMQ=="; // Password: 1221

    function validate() {
        const u = document.getElementById('uField').value;
        const p = document.getElementById('pField').value;
        if(btoa(u) === _0x1 && btoa(p) === _0x2) {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('main-app').style.display = "block";
            start();
        } else { document.getElementById('err').style.display = "block"; }
    }

    function start() {
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString();
            document.getElementById('date').innerText = n.toLocaleDateString('am-ET');
        }, 1000);

        const judges = ["መ/ር ዳዊት የማነ", "መ/ር ደለለኝ አጥላው", "መ/ርት መሰረት ፋንታ", "መ/ር ባየልኝ አይተንፍሱ", "መ/ር አሰጋኸኝ በሻህ", "መ/ር ተፈሪ ታደሰ", "መ/ር እሸቱ አለሙ", "መ/ር ተፈራ ፈቀደው", "መ/ርት መሰረት ግዛቸው", "ር/መ/ር አማረ አሰፋ"];
        document.querySelectorAll('.jList').forEach(s => {
            s.innerHTML = "<option>--- ምረጥ ---</option>";
            judges.forEach(j => { let o = document.createElement('option'); o.text = j; s.add(o); });
        });

        const b = document.getElementById('rows');
        for(let i=1; i<=6; i++) {
            b.innerHTML += `<tr id="r${i}"><td>${i}</td><td><input type="text" style="width:90%; padding:5px;" oninput="doRank()"></td>
                ${Array(10).fill().map(() => `<td><div class="btn-check" onclick="m(this, ${i})">-</div></td>`).join('')}
                <td id="c${i}">0</td><td id="w${i}">0</td><td id="t${i}">0/10</td><td id="rk${i}" style="font-weight:bold; color:blue;">-</td></tr>`;
        }
    }

    function m(el, id) {
        if(el.innerText === "-") { el.innerText = "✓"; el.className = "btn-check correct"; }
        else if(el.innerText === "✓") { el.innerText = "X"; el.className = "btn-check wrong"; }
        else { el.innerText = "-"; el.className = "btn-check"; }
        
        const row = document.getElementById('r'+id);
        const c = row.querySelectorAll('.correct').length;
        document.getElementById('c'+id).innerText = c;
        document.getElementById('w'+id).innerText = row.querySelectorAll('.wrong').length;
        document.getElementById('t'+id).innerText = c + "/10";
        doRank();
    }

    function doRank() {
        let s = [];
        for(let i=1; i<=6; i++) {
            let val = parseInt(document.getElementById('c'+i).innerText);
            let n = document.getElementById('r'+i).getElementsByTagName('input')[0].value;
            if(n !== "" || val > 0) s.push({id: i, v: val});
        }
        let sorted = s.map(x => x.v).sort((a,b) => b-a);
        s.forEach(item => {
            document.getElementById('rk'+item.id).innerText = (sorted.indexOf(item.v) + 1) + "ኛ";
        });
    }

    function save() {
        let h = document.getElementById('hTable').getElementsByTagName('tbody')[0];
        let g = document.getElementById('selGrade').value;
        for(let i=1; i<=6; i++) {
            let n = document.getElementById('r'+i).getElementsByTagName('input')[0].value;
            if(n !== "") {
                h.innerHTML += `<tr><td>${g}</td><td>${n}</td><td>${document.getElementById('t'+i).innerText}</td><td>${document.getElementById('rk'+i).innerText}</td></tr>`;
            }
        }
        document.getElementById('history').style.display = "block";
        alert("ተመዝግቧል!");
    }
</script>

</body>
</html>
