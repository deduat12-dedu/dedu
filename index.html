<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የጥያቄና መልስ ውጤት መያዣ</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg); 
            padding: 20px;
            margin: 0;
        }

        .main-card { 
            max-width: 1250px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 25px; /* የገጹ ኪብነት */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary); font-size: 26px; margin-bottom: 25px; }

        .top-info { 
            display: flex; 
            justify-content: space-between; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #eee;
        }

        .input-field { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; outline: none; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
        
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        
        th { background: #2c3e50; color: white; font-size: 13px; }

        /* የራይጥ እና ኤክስ ሰፊ ሳጥን */
        .check-box { 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 24px; 
            height: 55px; /* ሰፊ ከፍታ */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #fff;
            border-radius: 8px;
            transition: 0.2s;
            border: 1px solid #f0f0f0;
        }

        .check-box:hover { background: #f1f3f5; transform: scale(1.02); }
        .correct { color: var(--success); background: #e8f5e9 !important; border-color: #c8e6c9; }
        .wrong { color: var(--danger); background: #ffebee !important; border-color: #ffcdd2; }

        .footer-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; 
            margin-top: 30px; 
            padding: 20px;
            background: #fafafa;
            border-radius: 15px;
        }

        .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }

        button { 
            padding: 15px 35px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.3s;
        }

        .print-btn { background: var(--primary); color: white; }
        .next-btn { background: #f39c12; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        @media print { .btn-container, select, input { display: none; } .main-card { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<div class="main-card">
    <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ ቅፅ</h2>
    
    <div class="top-info">
        <div>
            ቀን፡ <input type="date" id="dateInput" class="input-field">
            <div id="clock" style="font-size: 12px; margin-top: 5px; color: #666;"></div>
        </div>
        <div>
            ክፍል፡ 
            <select id="grade" class="input-field">
                <option>1ኛሀ</option><option>1ኛለ</option><option>2ኛሀ</option><option>2ኛለ</option>
                <option>3ኛሀ</option><option>4ኛሀ</option><option>5ኛሀ</option><option>6ኛሀ</option>
            </select>
        </div>
        <div>
            ሴሚስተር፡ 
            <select id="semester" class="input-field">
                <option value="1ኛ">1ኛ ሴሚስተር</option>
                <option value="2ኛ" selected>2ኛ ሴሚስተር</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2" style="width: 40px;">ተ.ቁ</th>
                <th rowspan="2" style="width: 200px;">የተወዳዳሪዎች ስም</th>
                <th colspan="2">አማርኛ</th><th colspan="2">ኢንግሊዝኛ</th>
                <th colspan="2">ሒሳብ</th><th colspan="2">አ/ሳይንስ</th>
                <th colspan="2">ግብረገብ</th>
                <th rowspan="2">✓</th><th rowspan="2">X</th><th rowspan="2">ድምር</th><th rowspan="2">ደረጃ</th>
            </tr>
            <tr>
                <th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th>
            </tr>
        </thead>
        <tbody id="quizRows"></tbody>
    </table>

    <div class="footer-section">
        <div>
            <h4 style="color: var(--primary);">የውድድሩ ዳኞች</h4>
            1ኛ፡ <select class="judges input-field" style="width: 80%; margin-bottom: 10px;"></select><br>
            2ኛ፡ <select class="judges input-field" style="width: 80%; margin-bottom: 10px;"></select><br>
            3ኛ፡ <select class="judges input-field" style="width: 80%;"></select>
        </div>
        <div>
            <h4 style="color: var(--primary);">አወዳዳሪ ኮሚቴዎች</h4>
            <p>ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b></p>
            <p>ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b></p>
            <p>ፊርማ፡ ____________________</p>
        </div>
    </div>

    <div class="btn-container">
        <button class="print-btn" onclick="window.print()">🖨️ ውጤቱን አትም (Print)</button>
        <button class="next-btn" onclick="resetPage()">➕ አዲስ ውድድር (Next)</button>
    </div>
</div>

<script>
    const judgeList = ["መ/ር ዳዊት የማነ", "መ/ር ደለለኝ አጥላው", "መ/ርት መሰረት ፋንታ", "መ/ር ባየልኝ አይተንፍሱ", "መ/ር አሰጋኸኝ በሻህ", "መ/ር ተፈሪ ታደሰ", "መ/ር እሸቱ አለሙ", "መ/ር ተፈራ ፈቀደው", "መ/ርት መሰረት ግዛቸው", "ር/መ/ር አማረ አሰፋ"];

    function setup() {
        // ዳኞችን መሙላት
        document.querySelectorAll('.judges').forEach(s => {
            s.innerHTML = "<option>--- ምረጥ ---</option>";
            judgeList.forEach(j => { let o = document.createElement('option'); o.text = j; s.add(o); });
        });

        // ረድፎችን መፍጠር
        const tbody = document.getElementById('quizRows');
        tbody.innerHTML = "";
        for (let i = 1; i <= 6; i++) {
            tbody.innerHTML += `
                <tr id="r-${i}">
                    <td>${i}</td>
                    <td><input type="text" class="input-field" placeholder="ስም..." oninput="rankAll()"></td>
                    ${Array(10).fill().map(() => `<td><div class="check-box" onclick="toggle(this, ${i})">-</div></td>`).join('')}
                    <td id="c-${i}" style="color: green; font-weight: bold;">0</td>
                    <td id="w-${i}" style="color: red; font-weight: bold;">0</td>
                    <td id="t-${i}" style="font-weight: bold;">0/10</td>
                    <td id="rank-${i}" style="color: blue; font-weight: 900;">-</td>
                </tr>`;
        }
        document.getElementById('dateInput').valueAsDate = new Date();
        setInterval(() => { document.getElementById('clock').innerText = "ሰዓት፡ " + new Date().toLocaleTimeString(); }, 1000);
    }

    function toggle(el, id) {
        if (el.innerText === "-") { el.innerText = "✓"; el.className = "check-box correct"; }
        else if (el.innerText === "✓") { el.innerText = "X"; el.className = "check-box wrong"; }
        else { el.innerText = "-"; el.className = "check-box"; }
        
        let row = document.getElementById(`r-${id}`);
        let boxes = row.querySelectorAll('.check-box');
        let c = 0, w = 0;
        boxes.forEach(b => { if(b.innerText === "✓") c++; if(b.innerText === "X") w++; });
        
        document.getElementById(`c-${id}`).innerText = c;
        document.getElementById(`w-${id}`).innerText = w;
        document.getElementById(`t-${id}`).innerText = c + "/10";
        rankAll();
    }

    function rankAll() {
        let scores = [];
        for (let i = 1; i <= 6; i++) {
            let s = parseInt(document.getElementById(`c-${i}`).innerText);
            let n = document.getElementById(`r-${i}`).querySelector('input').value;
            scores.push({ id: i, score: s, active: n.trim() !== "" || s > 0 });
        }
        let sorted = [...scores].filter(x => x.active).sort((a,b) => b.score - a.score);
        scores.forEach(s => {
            if(s.active) {
                let r = sorted.findIndex(x => x.score === s.score) + 1;
                document.getElementById(`rank-${s.id}`).innerText = r + "ኛ";
            } else { document.getElementById(`rank-${s.id}`).innerText = "-"; }
        });
    }

    function resetPage() { if(confirm("ሁሉንም አጥፍቶ አዲስ ገጽ ይጀምር?")) setup(); }

    setup();
</script>

</body>
</html>
