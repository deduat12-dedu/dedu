<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>TOS Builder - Fit to One Page</title>
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        
        /* Glassmorphism Design */
        .glass { 
            background: white; padding: 25px; border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            max-width: 1100px; margin: auto; 
        }

        .btns { 
            background: #1a3a5f; padding: 12px; border-radius: 8px; 
            margin-bottom: 20px; display: flex; gap: 10px; justify-content: center;
        }

        button { padding: 10px 18px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-pdf { background: #e74c3c; color: white; }
        .btn-lang { background: #8e44ad; color: white; }
        .btn-add { background: #27ae60; color: white; }
        .btn-print { background: #f1c40f; color: black; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; table-layout: fixed; }
        th, td { border: 2px solid #1a3a5f; padding: 6px; text-align: center; font-size: 12px; word-wrap: break-word; }
        th { background: #1a3a5f; color: white; }
        
        .v-text { writing-mode: vertical-rl; transform: rotate(180deg); height: 100px; font-size: 11px; }

        .logo-box { width: 90px; height: 90px; border: 2px dashed #1a3a5f; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .logo-box img { max-width: 100%; max-height: 100%; }
        .logo-box input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .sigs { display: flex; justify-content: space-between; margin-top: 30px; }
        .sig-box { width: 30%; text-align: center; border-top: 2px solid #1a3a5f; padding-top: 5px; font-size: 13px; }

        /* ማተሚያ ቅንብር (Print Setup to Fit One Page) */
        @media print {
            @page { size: landscape; margin: 5mm; }
            body { background: white; padding: 0; }
            .btns { display: none !important; } /* ቁልፎቹ በህትመት ላይ አይወጡም */
            .glass { 
                box-shadow: none; border: none; width: 100%; max-width: 100%; padding: 0; margin: 0;
            }
            table { font-size: 10px; width: 100% !important; }
            th, td { padding: 4px !important; }
            .v-text { height: 80px; }
        }
    </style>
</head>
<body>

<div class="btns">
    <button class="btn-lang" onclick="changeLang()">🌍 አማርኛ/EN</button>
    <button class="btn-add" onclick="addRow()">➕ Add Row</button>
    <button class="btn-print" onclick="window.print()">🖨️ Print (በአንድ ገጽ)</button>
    <button class="btn-pdf" onclick="pdf()">📄 Save as PDF</button>
</div>

<div class="glass" id="area">
    <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #1a3a5f; padding-bottom: 10px; margin-bottom: 10px;">
        <div class="logo-box">
            <span id="l-up" style="font-size: 10px; color: #1a3a5f;">Logo Here</span>
            <input type="file" onchange="showL(this)">
            <img id="imgL" src="" style="display:none">
        </div>
        <div style="text-align: center;">
            <h2 id="h-title" contenteditable="true" style="margin:0; font-size: 20px;">Table of Specification (TOS)</h2>
            <p id="h-sub" contenteditable="true" style="margin:5px 0; font-weight: bold;">2018 E.C. Mid-Examination</p>
        </div>
        <div style="width: 90px;"></div>
    </div>

    <table id="table">
        <thead>
            <tr>
                <th rowspan="2" style="width: 30px;" id="h-no">No</th>
                <th rowspan="2" style="width: 180px;" id="h-con">Contents</th>
                <th rowspan="2" class="v-text" id="h-per">Period</th>
                <th rowspan="2" class="v-text" id="h-itm">Items</th>
                <th colspan="6" id="h-obj">Instructional Objectives</th>
                <th rowspan="2" class="v-text" id="h-tot">Total</th>
            </tr>
            <tr>
                <th class="v-text" id="o1">Knowledge</th><th class="v-text" id="o2">Comprehension</th>
                <th class="v-text" id="o3">Application</th><th class="v-text" id="o4">Analysis</th>
                <th class="v-text" id="o5">Synthesis</th><th class="v-text" id="o6">Evaluation</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr>
                <td>1</td>
                <td contenteditable="true" style="text-align:left">Unit Name...</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td style="background:#eee; font-weight:bold">0</td>
            </tr>
        </tbody>
    </table>

    <div class="sigs">
        <div class="sig-box"><b id="s1">Teacher</b><br><span contenteditable="true">Delelegn Atlaw</span></div>
        <div class="sig-box"><b id="s2">Dept. Head</b><br><span contenteditable="true">________________</span></div>
        <div class="sig-box"><b id="s3">Principal</b><br><span contenteditable="true">Amare Asefa</span></div>
    </div>
</div>

<script>
    let isAm = false;
    function changeLang() {
        isAm = !isAm;
        document.getElementById('h-no').innerText = isAm ? "ተ.ቁ" : "No";
        document.getElementById('h-con').innerText = isAm ? "ይዘቶች" : "Contents";
        document.getElementById('h-per').innerText = isAm ? "ክፍለ-ጊዜ" : "Period";
        document.getElementById('h-itm').innerText = isAm ? "ጥያቄ ብዛት" : "Items";
        document.getElementById('h-obj').innerText = isAm ? "የትምህርት ዓላማዎች" : "Instructional Objectives";
        document.getElementById('h-tot').innerText = isAm ? "ድምር" : "Total";
        document.getElementById('s1').innerText = isAm ? "መምህር" : "Teacher";
        document.getElementById('s2').innerText = isAm ? "የክፍል ኃላፊ" : "Dept. Head";
        document.getElementById('s3').innerText = isAm ? "ርዕሰ መምህር" : "Principal";
        document.getElementById('o1').innerText = isAm ? "ዕውቀት" : "Knowledge";
        document.getElementById('o2').innerText = isAm ? "ግንዛቤ" : "Comprehension";
        document.getElementById('o3').innerText = isAm ? "ተግባር" : "Application";
        document.getElementById('o4').innerText = isAm ? "ትንተና" : "Analysis";
        document.getElementById('o5').innerText = isAm ? "ውህደት" : "Synthesis";
        document.getElementById('o6').innerText = isAm ? "ምዘና" : "Evaluation";
    }

    function showL(i) {
        if (i.files && i.files[0]) {
            let r = new FileReader();
            r.onload = e => { 
                document.getElementById('imgL').src = e.target.result; 
                document.getElementById('imgL').style.display='block'; 
                document.getElementById('l-up').style.display='none'; 
            };
            r.readAsDataURL(i.files[0]);
        }
    }

    function calc() {
        let rs = document.querySelectorAll('#tbody tr');
        rs.forEach(r => {
            let sum = 0;
            for(let i=4; i<=9; i++) sum += Number(r.cells[i].innerText) || 0;
            r.cells[10].innerText = sum;
        });
    }

    function addRow() {
        let b = document.getElementById('tbody');
        let r = b.insertRow();
        r.innerHTML = `<td>${b.rows.length}</td><td contenteditable="true" style="text-align:left">New Unit</td>
            <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
            ${'<td contenteditable="true" oninput="calc()">0</td>'.repeat(6)}
            <td style="background:#eee; font-weight:bold">0</td>`;
    }

    function pdf() {
        const e = document.getElementById('area');
        const opt = {
            margin: 5,
            filename: 'TOS_Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().from(e).set(opt).save();
    }
</script>
</body>
</html>
