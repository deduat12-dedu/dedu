<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የጥያቄና መልስ ውድድር ውጤት መያዣ</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f4f7f9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: var(--bg); 
            color: #333;
        }

        .container { 
            max-width: 1300px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; /* የገጹ ኪብነት */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border: 1px solid #e1e8ed;
        }

        h2 { text-align: center; color: var(--primary); font-size: 28px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .header-box { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 30px; 
            padding: 20px; 
            background: #f8fafd; 
            border-radius: 15px;
        }

        .header-item { display: flex; flex-direction: column; gap: 5px; font-weight: bold; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 30px; overflow: hidden; border-radius: 10px; border: 1px solid #ddd; }
        
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; }
        
        th { background-color: var(--secondary); color: white; font-size: 14px; text-transform: uppercase; }

        .subj-head { background-color: #3e5062; font-size: 13px; }

        /* የራይጥ እና ኤክስ ቦታዎች እንዲሰፉ */
        .checkbox-cell { 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            height: 45px; /* ከፍታው ጨምሯል */
            background: #fff;
            border-radius: 5px;
            transition: all 0.2s ease;
        }

        .checkbox-cell:hover { background: #f0f4f8; transform: scale(1.05); }
        .correct { color: var(--success); background: #e9f7ef !important; }
        .wrong { color: var(--danger); background: #fdedec !important; }

        input[type="text"], select, input[type="date"] { 
            width: 90%; 
            padding: 10px; 
            border: 1px solid #d1d9e0; 
            border-radius: 8px; 
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 5px rgba(26,42,108,0.2); }

        .footer-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 50px; 
            margin-top: 40px; 
            padding: 25px; 
            background: #fcfcfc; 
            border-radius: 15px;
            border: 1px solid #efefef;
        }

        .btn-group { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 40px; 
        }

        button { 
            padding: 14px 30px; 
            border-radius: 10px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-print { background: var(--primary); color: white; }
        .btn-save { background: var(--success); color: white; }
        .btn-next { background: var(--warning); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        @media print { 
            .btn-group, .header-box select, .header-box input { display: none; } 
            .container { box-shadow: none; border: none; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>የጥያቄና መልስ ውድድር ውጤት መያዣ ቅፅ</h2>
    
    <div class="header-box">
        <div class="header-item">
            ቀን እና ሰዓት
            <input type="date" id="datePicker">
            <small id="liveTime" style="color: #666;"></small>
        </div>
        <div class="header-item">
            የተወዳዳሪዎች ክፍል
            <select id="gradeLevel">
                <option>1ኛሀ</option><option>1ኛለ</option><option>2ኛሀ</option><option>2ኛለ</option>
                <option>3ኛሀ</option><option>4ኛሀ</option><option>5ኛሀ</option><option>6ኛሀ</option>
            </select>
        </div>
        <div class="header-item">
            ሴሚስተር
            <select id="semester">
                <option>1ኛ ሴሚስተር</option>
                <option selected>2ኛ ሴሚስተር</option>
            </select>
        </div>
    </div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th rowspan="2" style="width: 40px;">ተ.ቁ</th>
                <th rowspan="2" style="width: 180px;">የተወዳዳሪዎች ስም</th>
                <th colspan="2" class="subj-head">አማርኛ</th>
                <th colspan="2" class="subj-head">ኢንግሊዝኛ</th>
                <th colspan="2" class="subj-head">ሒሳብ</th>
                <th colspan="2" class="subj-head">አ/ሳይንስ</th>
                <th colspan="2" class="subj-head">ግብረገብ</th>
                <th rowspan="2" style="width: 50px;">✓</th>
                <th rowspan="2" style="width: 50px;">X</th>
                <th rowspan="2" style="width: 70px;">ድምር</th>
                <th rowspan="2" style="width: 60px;">ደረጃ</th>
            </tr>
            <tr>
                <th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th>
            </tr>
        </thead>
        <tbody id="rowsBody">
            <!-- Rows injected by JS -->
        </tbody>
    </table>

    <div class="footer-grid">
        <div>
            <h4 style="color: var(--primary); margin-top: 0;">የውድድሩ ዳኞች</h4>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                1ኛ፡ <select class="judge-dropdown"></select>
                2ኛ፡ <select class="judge-dropdown"></select>
                3ኛ፡ <select class="judge-dropdown"></select>
            </div>
        </div>
        <div>
            <h4 style="color: var(--primary); margin-top: 0;">አወዳዳሪ ኮሚቴዎች</h4>
            <p>ሰብሳቢ፡ <span style="border-bottom: 1px solid #333; padding: 0 10px;">መ/ር ደለለኝ አጥላው</span></p>
            <p>ፀሀፊ፡ <span style="border-bottom: 1px solid #333; padding: 0 10px;">መ/ርት መሰረት ፋንታ</span></p>
            <p style="margin-top: 20px;">ፊርማ፡ ________________________</p>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-print" onclick="window.print()">🖨️ ውጤቱን አትም (Print)</button>
        <button class="btn-save" onclick="alert('ውጤቱ በስኬት ተቀምጧል!')">💾 ዳታውን መዝግብ (Store)</button>
        <button class="btn-next" onclick="resetApp()">➕ አዲስ ውድድር ጀምር</button>
    </div>
</div>

<script>
    const allJudges = ["መ/ር ዳዊት የማነ", "መ/ር ደለለኝ አጥላው", "መ/ርት መሰረት ፋንታ", "መ/ር ባየልኝ አይተንፍሱ", "መ/ር አሰጋኸኝ በሻህ", "መ/ር ተፈሪ ታደሰ", "መ/ር እሸቱ አለሙ", "መ/ር ተፈራ ፈቀደው", "መ/ርት መሰረት ግዛቸው", "ር/መ/ር አማረ አሰፋ"];

    function init() {
        // ዳኞችን መሙላት
        document.querySelectorAll('.judge-dropdown').forEach(select => {
            select.innerHTML = "<option>--- ዳኛ ምረጥ ---</option>";
            allJudges.forEach(j => {
                let opt = document.createElement('option');
                opt.text = j; select.add(opt);
            });
        });

        // ሰንጠረዡን መፍጠር
        const body = document.getElementById('rowsBody');
        body.innerHTML = "";
        for (let i = 1; i <= 6; i++) {
            body.innerHTML += `
                <tr id="row-${i}">
                    <td>${i}</td>
                    <td><input type="text" placeholder="ስም ያስገቡ..." oninput="calculateRanks()"></td>
                    ${Array(10).fill().map(() => `<td><div class="checkbox-cell" onclick="handleToggle(this, ${i})">-</div></td>`).join('')}
                    <td id="cor-${i}" style="font-weight: bold; color: green;">0</td>
                    <td id="wro-${i}" style="font-weight: bold; color: red;">0</td>
                    <td id="tot-${i}" style="font-weight: bold; background: #f9f9f9;">0/10</td>
                    <td id="rank-${i}" style="color: blue; font-weight: 800; font-size: 16px;">-</td>
                </tr>
            `;
        }
        document.getElementById('datePicker').valueAsDate = new Date();
        setInterval(() => {
            document.getElementById('liveTime').innerText = "ሰዓት፡ " + new Date().toLocaleTimeString();
        }, 1000);
    }

    function handleToggle(el, id) {
        if (el.innerText === "-") {
            el.innerText = "✓";
            el.className = "checkbox-cell correct";
        } else if (el.innerText === "✓") {
            el.innerText = "X";
            el.className = "checkbox-cell wrong";
        } else {
            el.innerText = "-";
            el.className = "checkbox-cell";
        }
        updateRowScore(id);
    }

    function updateRowScore(id) {
        let row = document.getElementById(`row-${id}`);
        let boxes = row.querySelectorAll('.checkbox-cell');
        let c = 0, w = 0;
        boxes.forEach(b => {
            if (b.innerText === "✓") c++;
            if (b.innerText === "X") w++;
        });
        document.getElementById(`cor-${id}`).innerText = c;
        document.getElementById(`wro-${id}`).innerText = w;
        document.getElementById(`tot-${id}`).innerText = `${c}/10`;
        calculateRanks();
    }

    function calculateRanks() {
        let scores = [];
        for (let i = 1; i <= 6; i++) {
            let val = parseInt(document.getElementById(`cor-${i}`).innerText);
            let name = document.getElementById(`row-${i}`).querySelector('input').value;
            scores.push({ id: i, score: val, hasName: name.trim() !== "" });
        }

        let sorted = [...scores].filter(s => s.hasName || s.score > 0).sort((a, b) => b.score - a.score);
        
        scores.forEach(s => {
            if (s.hasName || s.score > 0) {
                let r = sorted.findIndex(x => x.score === s.score) + 1;
                document.getElementById(`rank-${s.id}`).innerText = r + "ኛ";
            } else {
                document.getElementById(`rank-${s.id}`).innerText = "-";
            }
        });
    }

    function resetApp() {
        if (confirm("እርግጠኛ ነዎት? ሁሉም መረጃዎች ይጠፋሉ!")) init();
    }

    init();
</script>

</body>
</html>
