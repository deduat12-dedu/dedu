<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የውድድር ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* መግቢያ ገጽ */
        #login-page { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; width: 320px; }
        .input-box { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: #1a2a6c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        /* ዋናው ሰንጠረዥ (መጀመሪያ የተደበቀ) */
        #main-app { display: none; width: 95%; max-width: 1150px; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: 20px auto; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #2c3e50; color: white; font-size: 13px; }

        .check-btn { cursor: pointer; font-weight: bold; font-size: 22px; height: 45px; display: flex; align-items: center; justify-content: center; background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; }
        .correct { background-color: #e8f5e9 !important; color: #27ae60; border-color: #27ae60; }
        .wrong { background-color: #ffebee !important; color: #e74c3c; border-color: #e74c3c; }

        .top-bar { display: flex; justify-content: space-between; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .btn-action { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; color: white; }
    </style>
</head>
<body>

<!-- 1. LOGIN SECTION -->
<div id="login-page">
    <h2 style="color:#1a2a6c">መግቢያ (Log In)</h2>
    <input type="text" id="userInput" class="input-box" placeholder="ስም (Username)">
    <input type="password" id="passInput" class="input-box" placeholder="ሚስጥራዊ ቁጥር (Password)">
    <p id="error" style="color:red; font-size:13px; display:none;">ስም ወይም ፓስወርድ ተሳስቷል!</p>
    <button class="login-btn" onclick="startApp()">ግባ</button>
</div>

<!-- 2. MAIN APP SECTION -->
<div id="main-app">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:#1a2a6c">የጥያቄና መልስ ውጤት መያዣ</h2>
        <button onclick="location.reload()" style="background:#ddd; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">ውጣ (Logout)</button>
    </div>

    <div class="top-bar">
        <div>ክፍል፡ <select id="grade" style="padding:5px;"><option>1ኛሀ</option><option>1ኛለ</option><option>2ኛሀ</option><option>3ኛሀ</option></select></div>
        <div>ሴሚስተር፡ <select id="sem" style="padding:5px;"><option>1ኛ</option><option selected>2ኛ</option></select></div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2">ተ.ቁ</th>
                <th rowspan="2" style="width:200px">የተወዳዳሪ ስም</th>
                <th colspan="2">አማርኛ</th><th colspan="2">እንግሊዝኛ</th><th colspan="2">ሒሳብ</th><th colspan="2">አ/ሳይንስ</th><th colspan="2">ግብረገብ</th>
                <th rowspan="2">✓</th><th rowspan="2">X</th><th rowspan="2">ድምር</th><th rowspan="2">ደረጃ</th>
            </tr>
            <tr>
                <th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th>
            </tr>
        </thead>
        <tbody id="quizRows">
            <!-- JavaScript will fill this -->
        </tbody>
    </table>

    <div style="text-align: center; margin-top: 25px;">
        <button class="btn-action" style="background:#27ae60" onclick="saveData()">💾 ውጤቱን መዝግብ (Save)</button>
        <button class="btn-action" style="background:#34495e" onclick="window.print()">🖨️ ውጤቱን አትም (Print)</button>
    </div>

    <div id="historyTable" style="margin-top:30px; display:none;">
        <h3 style="color:#1a2a6c">የተመዘገቡ ውጤቶች</h3>
        <table id="hTable" style="background:#fafafa;"><thead><tr><th>ክፍል</th><th>ስም</th><th>ውጤት</th><th>ደረጃ</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<script>
    // 1. መግቢያውን የሚያረጋግጥ ተግባር
    function startApp() {
        var u = document.getElementById('userInput').value;
        var p = document.getElementById('passInput').value;

        // በትክክል ከተሞላ (Delu እና 1221)
        if (u === "Delu" && p === "1221") {
            document.getElementById('login-page').style.display = "none";
            document.getElementById('main-app').style.display = "block";
            document.body.style.display = "block"; // Reset centering
            loadRows();
        } else {
            document.getElementById('error').style.display = "block";
        }
    }

            var rowHtml = '<tr id="row-'+i+'">' +
