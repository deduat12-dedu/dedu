<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የውድድር ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        
        /* Login Form */
        #login-box { 
            width: 320px; margin: 100px auto; background: white; padding: 40px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
        }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #1a2a6c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Main Application (Hidden) */
        #app { display: none; max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #2c3e50; color: white; font-size: 12px; }
        
        .box { 
            cursor: pointer; font-weight: bold; font-size: 22px; height: 45px; 
            display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 5px; border: 1px solid #eee;
        }
        .correct { background-color: #e8f5e9 !important; color: #27ae60; }
        .wrong { background-color: #ffebee !important; color: #e74c3c; }

        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .btn-save { background: #27ae60; color: white; padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<!-- መግቢያ ገጽ -->
<div id="login-box">
    <h2 style="color:#1a2a6c">መግቢያ (Log In)</h2>
    <div class="input-group">
        <label>የተጠቃሚ ስም</label>
        <input type="text" id="uName" placeholder="Delu">
    </div>
    <div class="input-group">
        <label>ሚስጥራዊ ቁጥር</label>
        <input type="password" id="uPass" placeholder="1221">
    </div>
    <p id="errMsg" style="color:red; display:none; font-size:13px;">ስም ወይም ፓስወርድ ተሳስቷል!</p>
    <button class="btn-login" onclick="doLogin()">ግባ</button>
</div>

<!-- ዋናው ሰንጠረዥ -->
<div id="app">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h2 style="color:#1a2a6c">የጥያቄና መልስ ውጤት መያዣ</h2>
        <button class="no-print" onclick="location.reload()" style="background:#f8d7da; border:none; padding:5px 10px; cursor:pointer">ውጣ</button>
    </div>

    <div class="header-info">
        <div>ክፍል፡ <select id="grade"><option>1ኛሀ</option><option>1ኛለ</option><option>2ኛሀ</option><option>3ኛሀ</option></select></div>
        <div>ሴሚስተር፡ <select id="sem"><option>1ኛ</option><option selected>2ኛ</option></select></div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2">ተ.ቁ</th>
                <th rowspan="2" style="width:180px">ተማሪ ስም</th>
                <th colspan="2">አማርኛ</th><th colspan="2">እንግሊዝኛ</th><th colspan="2">ሒሳብ</th><th colspan="2">አ/ሳይንስ</th><th colspan="2">ግብረገብ</th>
                <th rowspan="2">✓</th><th rowspan="2">X</th><th rowspan="2">ድምር</th><th rowspan="2">ደረጃ</th>
            </tr>
            <tr>
                <th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th><th>1</th><th>2</th>
            </tr>
        </thead>
        <tbody id="tableRows"></tbody>
    </table>

    <button class="btn-save no-print" onclick="saveToHistory()">💾 ውጤቱን መዝግብ (Save)</button>
    <button class="no-print" onclick="window.print()" style="background:#34495e; color:white; padding:12px 25px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; margin-left:10px;">🖨️ አትም (Print)</button>

    <div id="history" style="margin-top:30px; display:none">
        <h3 style="color:#1a2a6c">የተመዘገቡ ውጤቶች</h3>
        <table id="histTable"><thead><tr><th>ክፍል</th><th>ስም</th><th>ውጤት</th><th>ደረጃ</th></tr></thead><tbody></tbody></table>
    </div>

    <div style="margin-top:40px; border-top:1px solid #eee; padding-top:20px; display:flex; justify-content:space-between">
        <div>ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b></div>
        <div>ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b></div>
    </div>
</div>

<script>
    // መግቢያ
    function doLogin() {
        var user = document.getElementById('uName').value;
        var pass = document.getElementById('uPass').value;

        if(user === "Delu" && pass === "1221") {
            document.getElementById('login-box').style.display = "none";
            document.getElementById('app').style.display = "block";
            initTable();
        } else {
            document.getElementById('errMsg').style.display = "block";
        }
    }

    // ሰንጠረዥ መፍጠር
    function initTable() {
        var html = "";
        for(var i=1; i<=6; i++) {
            html += '<tr id="row'+i+'">' +
                '<td>'+i+'</td>' +
                '<td><input type="text" oninput="doRank()"></td>' +
                (new Array(10).fill('<td><div class="box" onclick="mark(this,'+i+')">-</div></td>').join('')) +
                '<td id="c'+i+'">0</td><td id="w'+i+'">0</td><td id="t'+i+'">0/10</td><td id="r'+i+'">-</td>' +
                '</tr>';
        }
        document.getElementById('tableRows').innerHTML = html;
    }

    // ምልክት ማድረጊያ
    function mark(el, id) {
        if(el.innerText === "-") { el.innerText = "✓"; el.className = "box correct"; }
        else if(el.innerText === "✓") { el.innerText = "X"; el.className = "box wrong"; }
        else { el.innerText = "-"; el.className = "box"; }
        updateRow(id);
    }

    function updateRow(id) {
        var row = document.getElementById('row'+id);
        var corrects = row.getElementsByClassName('correct').length;
        var wrongs = row.getElementsByClassName('wrong').length;
        document.getElementById('c'+id).innerText = corrects;
        document.getElementById('w'+id).innerText = wrongs;
        document.getElementById('t'+id).innerText = corrects + "/10";
        doRank();
    }

    function doRank() {
        var scores = [];
        for(var i=1; i<=6; i++) {
            var s = parseInt(document.getElementById('c'+i).innerText);
            var n = document.getElementById('row'+i).getElementsByTagName('input')[0].value;
            if(n !== "" || s > 0) scores.push({id: i, val: s});
        }
        scores.sort(function(a,b){ return b.val - a.val; });
        scores.forEach(function(item, idx){
            document.getElementById('r'+item.id).innerText = (idx + 1) + "ኛ";
        });
    }

    function saveToHistory() {
        var hist = document.getElementById('histTable').getElementsByTagName('tbody')[0];
        var grade = document.getElementById('grade').value;
        for(var i=1; i<=6; i++) {
            var name = document.getElementById('row'+i).getElementsByTagName('input')[0].value;
            var tot = document.getElementById('t'+i).innerText;
            var rnk = document.getElementById('r'+i).innerText;
            if(name !== "") {
                hist.innerHTML += '<tr><td>'+grade+'</td><td>'+name+'</td><td>'+tot+'</td><td>'+rnk+'</td></tr>';
            }
        }
        document.getElementById('history').style.display = "block";
        alert("ተቀምጧል!");
    }
</script>

</body>
</html>
