<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጣይቱ ብጡል አካዳሚ - TOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 15px; 
            font-family: 'Nyala', 'Abyssinica SIL', sans-serif;
            background: #f0f2f5;
        }
        .glass-container { 
            width: 95%; max-width: 1200px; margin: auto;
            background: white; padding: 30px; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .btns-top { 
            background: #333; padding: 10px; border-radius: 8px; 
            display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;
        }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-add { background: #28a745; } .btn-pdf { background: #dc3545; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; font-weight: bold; }
        
        /* ዋናው ማስተካከያ እዚህ ጋር ነው - PDF ላይ እንዳይገለበጥ */
        .v-text { 
            writing-mode: horizontal-tb !important; 
            transform: none !important; 
            display: table-cell !important;
            vertical-align: middle !important;
            height: auto !important;
            white-space: normal !important;
        }

        [contenteditable="true"] { background: #fffcf0; outline: none; }
        .total-row { background: #eee; }

        .sigs { display: flex; justify-content: space-between; margin-top: 50px; }
        .sig-box { text-align: center; width: 30%; }
        .line { border-top: 2px solid black; margin-top: 40px; width: 80%; margin-left: auto; margin-right: auto; }

        @media print {
            .btns-top { display: none; }
            .glass-container { box-shadow: none; width: 100%; padding: 0; }
            body { background: white; }
        }
    </style>
</head>
<body>

<div class="btns-top">
    <button class="btn-add" onclick="addRow()">➕ Unit ጨምር</button>
    <button class="btn-pdf" onclick="pdfExport()">📄 PDF አውርድ (Export)</button>
    <button style="background:#6c757d" onclick="window.print()">🖨️ በፕሪንተር አውጣ (Print)</button>
</div>

<div id="capture-area" class="glass-container">
    <div style="text-align: center; border-bottom: 3px solid black; padding-bottom: 10px;">
        <h1 contenteditable="true" style="margin:0;">TAYITU BTUL ACADEMY</h1>
        <h2 contenteditable="true" style="margin:5px 0;">TABLE OF SPECIFICATION (TOS)</h2>
    </div>

    <table id="tos-table">
        <thead>
            <tr>
                <th rowspan="2">No</th>
                <th rowspan="2" style="width: 250px;">Contents / Units</th>
                <th rowspan="2" class="v-text">Period</th>
                <th rowspan="2" class="v-text">Items</th>
                <th colspan="6">Learning Objectives</th>
                <th rowspan="2" class="v-text">Total</th>
            </tr>
            <tr>
                <th class="v-text">Knowledge</th>
                <th class="v-text">Comprehension</th>
                <th class="v-text">Application</th>
                <th class="v-text">Analysis</th>
                <th class="v-text">Synthesis</th>
                <th class="v-text">Evaluation</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr>
                <td>1</td>
                <td contenteditable="true" style="text-align:left"></td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td>
                <td style="background:#f9f9f9">0</td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="2" style="text-align:right; padding-right:10px;">GRAND TOTAL</td>
                <td id="t-per">0</td><td id="t-itm">0</td>
                <td id="t-1">0</td><td id="t-2">0</td><td id="t-3">0</td><td id="t-4">0</td><td id="t-5">0</td><td id="t-6">0</td>
                <td id="t-grand" style="background:#ddd">0</td>
            </tr>
        </tfoot>
    </table>

    <div class="sigs">
        <div class="sig-box"><b>Teacher</b><div class="line"></div></div>
        <div class="sig-box"><b>Dept. Head</b><div class="line"></div></div>
        <div class="sig-box"><b>Principal</b><div class="line"></div></div>
    </div>
</div>

<script>
    function calc() {
        let rows = document.querySelectorAll('#tbody tr');
        let gPer = 0, gItm = 0, gGrand = 0;
        let colSums = [0,0,0,0,0,0];

        rows.forEach((r, idx) => {
            r.cells[0].innerText = idx + 1;
            gPer += parseFloat(r.cells[2].innerText) || 0;
            gItm += parseFloat(r.cells[3].innerText) || 0;

            let rowSum = 0;
            for(let i=4; i<=9; i++) {
                let v = parseFloat(r.cells[i].innerText) || 0;
                rowSum += v;
                colSums[i-4] += v;
            }
            r.cells[10].innerText = rowSum;
            gGrand += rowSum;
        });

        document.getElementById('t-per').innerText = gPer;
        document.getElementById('t-itm').innerText = gItm;
        for(let j=0; j<6; j++) document.getElementById('t-' + (j+1)).innerText = colSums[j];
        document.getElementById('t-grand').innerText = gGrand;
    }

    function addRow() {
        let b = document.getElementById('tbody');
        let r = b.insertRow();
        r.innerHTML = `<td></td><td contenteditable="true" style="text-align:left"></td>
            <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
            <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
            <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
            <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
            <td style="background:#f9f9f9">0</td>`;
        calc();
    }

    function pdfExport() {
        const element = document.getElementById('capture-area');
        const opt = {
            margin: [10, 10],
            filename: 'TOS-Report.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().from(element).set(opt).save();
    }
</script>
</body>
</html>
