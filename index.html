<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>TOS - Glassmorphism & Animated Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 1. Animated Background - በዝግታ የሚቀያየር የጀርባ ቀለም */
        body { 
            margin: 0; padding: 20px; 
            font-family: 'Nyala', 'Abyssinica SIL', sans-serif;
            background: linear-gradient(-45deg, #4facfe, #00f2fe, #f093fb, #f5576c);
            background-size: 400% 400%;
            animation: moveBG 10s ease infinite;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes moveBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. Glassmorphism Appearance - ግልጽነት እና Blur Effect */
        .glass-container { 
            width: 95%; max-width: 1100px;
            background: rgba(255, 255, 255, 0.4); /* የገጹ ነጭ ቀለም ግልጽነት (Transparent) */
            backdrop-filter: blur(15px); /* የጀርባው ቀለም እንዲፈዝ የሚያደርግ (Blur) */
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            margin-top: 20px;
        }

        /* የቁልፎች ማስቀመጫ */
        .controls { 
            background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 12px; 
            margin-bottom: 10px; display: flex; gap: 10px; backdrop-filter: blur(5px);
        }

        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; }
        .btn-add { background: #27ae60; } .btn-rem { background: #e67e22; }
        .btn-pdf { background: #e74c3c; } .btn-lang { background: #8e44ad; }
        .btn-print { background: #f1c40f; color: black; }

        /* Header Section */
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
        .logo-circle { width: 80px; height: 80px; border: 2px solid #000; border-radius: 50%; overflow: hidden; background: white; display: flex; align-items: center; justify-content: center; position: relative; }
        .logo-square { width: 80px; height: 80px; border: 2px solid #000; border-radius: 5px; overflow: hidden; background: white; display: flex; align-items: center; justify-content: center; position: relative; }
        input[type="file"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .logo-img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Table */
        table { width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.8); }
        th, td { border: 2px solid #000; padding: 8px; text-align: center; font-weight: bold; }
        th { background: rgba(0,0,0,0.1); }
        .v-text { writing-mode: vertical-rl; transform: rotate(180deg); height: 90px; }
        
        [contenteditable="true"]:focus { background: yellow; outline: none; }

        /* Signatures */
        .sigs { display: flex; justify-content: space-between; margin-top: 40px; }
        .sig-box { width: 30%; text-align: center; }
        .sig-line { border-top: 2px solid #000; margin-top: 40px; }

        @media print {
            body { background: white; }
            .controls { display: none; }
            .glass-container { background: white; box-shadow: none; border: none; backdrop-filter: none; }
        }
    </style>
</head>
<body>

<div class="controls">
    <button class="btn-lang" onclick="changeLang()">🌍 አማርኛ/EN</button>
    <button class="btn-add" onclick="addRow()">➕ Unit ጨምር</button>
    <button class="btn-rem" onclick="removeRow()">➖ Unit ቀንስ</button>
    <button class="btn-print" onclick="window.print()">🖨️ Print</button>
    <button class="btn-pdf" onclick="pdf()">📄 Export PDF</button>
</div>

<div class="glass-container" id="tos-area">
    <div class="header">
        <div class="logo-circle">
            <span style="font-size: 10px;">ክብ ሎጎ</span>
            <input type="file" onchange="loadImg(this, 'l-img')">
            <img id="l-img" class="logo-img">
        </div>
        <div style="text-align: center;">
            <h2 contenteditable="true" style="margin:0;">TABLE OF SPECIFICATION (TOS)</h2>
            <h4 contenteditable="true" style="margin:5px 0;">2018 E.C. - MID EXAMINATION</h4>
        </div>
        <div class="logo-square">
            <span style="font-size: 10px;">አራት ማዕዘን</span>
            <input type="file" onchange="loadImg(this, 'r-img')">
            <img id="r-img" class="logo-img">
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2" id="h-no">No</th>
                <th rowspan="2" id="h-con" style="width: 250px;">Contents / Units</th>
                <th rowspan="2" class="v-text" id="h-per">Period</th>
                <th rowspan="2" class="v-text" id="h-itm">Items</th>
                <th colspan="6" id="h-obj">Instructional Objectives</th>
                <th rowspan="2" class="v-text" id="h-tot">Total</th>
            </tr>
            <tr>
                <th class="v-text">Knowledge</th><th class="v-text">Comprehension</th>
                <th class="v-text">Application</th><th class="v-text">Analysis</th>
                <th class="v-text">Synthesis</th><th class="v-text">Evaluation</th>
            </tr>
        </thead>
        <tbody id="tbody">
            <tr>
                <td>1</td><td contenteditable="true"></td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
                <td style="background:#eee">0</td>
            </tr>
        </tbody>
    </table>

    <div class="sigs">
        <div class="sig-box"><div class="sig-line"></div><b>Subject Teacher</b></div>
        <div class="sig-box"><div class="sig-line"></div><b>Dept. Head</b></div>
        <div class="sig-box"><div class="sig-line"></div><b>Principal</b></div>
    </div>
</div>

<script>
    function addRow() {
        let b = document.getElementById('tbody');
        let r = b.insertRow();
        r.innerHTML = `<td>${b.rows.length}</td><td contenteditable="true"></td>
            <td contenteditable="true" oninput="calc()">0</td><td contenteditable="true" oninput="calc()">0</td>
            ${'<td contenteditable="true" oninput="calc()">0</td>'.repeat(6)}<td style="background:#eee">0</td>`;
    }
    function removeRow() { 
        let b = document.getElementById('tbody'); 
        if(b.rows.length > 1) b.deleteRow(-1); 
    }
    function calc() {
        document.querySelectorAll('#tbody tr').forEach(r => {
            let s = 0;
            for(let i=4; i<=9; i++) s += Number(r.cells[i].innerText) || 0;
            r.cells[10].innerText = s;
        });
    }
    function loadImg(input, id) {
        if (input.files && input.files[0]) {
            let r = new FileReader();
            r.onload = e => { 
                let img = document.getElementById(id);
                img.src = e.target.result; img.style.display = 'block';
                input.previousElementSibling.style.display = 'none';
            };
            r.readAsDataURL(input.files[0]);
        }
    }
    function pdf() {
        html2pdf().from(document.getElementById('tos-area')).set({
            margin: 5, filename: 'TOS.pdf', jsPDF: { orientation: 'landscape' }
        }).save();
    }
</script>
</body>
</html>
