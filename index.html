<style>
    /* ... your existing styles ... */

    /* Orientation Controls */
    @page { size: auto; margin: 10mm; }
    .landscape-mode { size: landscape; }
    .portrait-mode { size: portrait; }

    .controls { 
        text-align: center; 
        margin-top: 30px; 
        display: flex; 
        justify-content: center; 
        align-items: center;
        gap: 15px; 
        background: #eee;
        padding: 20px;
        border-radius: 8px;
    }

    .orientation-selector {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: bold;
        color: #1a3a5f;
    }

    /* Print specific adjustment */
    @media print {
        .container { width: 100%; max-width: none; box-shadow: none; padding: 0; }
        .controls { display: none; }
    }
</style>

<div class="controls">
    <button class="btn btn-add" onclick="addRow()">+ Add New Row</button>
    
    <div class="orientation-selector">
        <label>Orientation:</label>
        <select id="pageOrientation" class="btn" style="background: white; color: #1a3a5f; border: 1px solid #1a3a5f;">
            <option value="portrait">Portrait (Vertical)</option>
            <option value="landscape" selected>Landscape (Horizontal)</option>
        </select>
    </div>

    <button class="btn btn-print" onclick="printTOS()">Print This Page</button>
</div>

<script>
    // ... your existing addRow and calculate functions ...

    function printTOS() {
        const orientation = document.getElementById('pageOrientation').value;
        const style = document.createElement('style');
        
        // Remove any previous orientation styles
        const oldStyle = document.getElementById('print-orientation');
        if (oldStyle) oldStyle.remove();

        // Inject the specific @page rule
        style.id = 'print-orientation';
        style.innerHTML = `@page { size: ${orientation}; }`;
        document.head.appendChild(style);

        window.print();
    }
</script>
