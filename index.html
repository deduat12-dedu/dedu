<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጥያቄና መልስ ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; padding: 15px; direction: ltr; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .top-bar { display: flex; justify-content: space-between; flex-wrap: wrap; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .timer-display { font-size: 22px; font-weight: bold; color: #d35400; background: #fff; padding: 5px 15px; border-radius: 4px; border: 1px solid #d35400; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .subject-header { background-color: #ecf0f1; font-weight: bold; color: #2c3e50; }

        .btn-check { cursor: pointer; border: 1px solid #ddd; padding: 4px 8px; border-radius: 3px; background: #fff; margin: 2px; font-weight: bold; transition: 0.2s; }
        .btn-check.active-right { background-color: #27ae60; color: white; border-color: #27ae60; }
        .btn-check.active-wrong { background-color: #e74c3c; color: white; border-color: #e74c3c; }

        .footer-section { margin-top: 25px; padding: 15px; background: #f8f9fa; border-top: 2px solid #3498db; }
        .action-btns { text-align: center; margin-top: 20px; }
        .btn-main { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; color: white; font-size: 15px; }
        .save-btn { background-color: #2ecc71; }
        .share-btn { background-color: #9b59b6; }
        .print-btn { background-color: #3498db; }

        @media print { .no-print, .btn-check { display: none; } .active-right::after { content: '✓'; color: black; } .active-wrong::after { content: 'X'; color: black; } }
    </style>
</head>
<body>

<div class="container">
    <h2>የጥያቄና መልስ ውጤት መያዣ</h2>

    <div class="top-bar">
        <div><strong>ቀን፡</strong> <input type="date" id="qDate" value="2026-03-22"></div>
        <div><strong>ክፍል፡</strong> <select id="qClass"><option>1ኛ ሀ</option><option>1ኛ ለ</option><option>2ኛ ሀ</option><option>3ኛ ሀ</option></select></div>
        <div class="no-print">
            <button onclick="startTimer()" style="background:#27ae60; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">ጀምር</button>
            <button onclick="stopTimer()" style="background:#e67e22; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">አቁም</button>
        </div>
        <div id="timer" class="timer-display">00:00:00</div>
    </div>

    <table id="scoreTable">
        <thead>
            <tr>
                <th rowspan="2">ተ.ቁ</th>
                <th rowspan="2" style="width: 150px;">ተማሪ ስም</th>
                <th colspan="2" class="subject-header">አማርኛ</th>
                <th colspan="2" class="subject-header">እንግሊዝኛ</th>
                <th colspan="2" class="subject-header">ሒሳብ</th>
                <th colspan="2" class="subject-header">አ/ሳይንስ</th>
                <th rowspan="2">ድምር</th>
            </tr>
            <tr>
                <th>ጥ1</th><th>ጥ2</th>
                <th>ጥ1</th><th>ጥ2</th>
                <th>ጥ1</th><th>ጥ2</th>
                <th>ጥ1</th><th>ጥ2</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <div class="footer-section">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <p><strong>1ኛ ዳኛ፡</strong> <select><option>መ/ር ደለለኝ አጥላው</option><option>መ/ር ዳዊት የማነ</option></select></p>
                <p><strong>ሰብሳቢ፡</strong> መ/ር ደለለኝ አጥላው</p>
            </div>
            <div>
                <p><strong>2ኛ ዳኛ፡</strong> <select><option>መ/ርት መሰረት ፋንታ</option><option>መ/ርት መሰረት ግዛቸው</option></select></p>
                <p><strong>ፀሀፊ፡</strong> መ/ርት መሰረት ፋንታ</p>
            </div>
        </div>
    </div>

    <div class="action-btns no-print">
        <button class="btn-main save-btn" onclick="saveData()">💾 ውጤቱን መዝግብ (Save)</button>
        <button class="btn-main share-btn" onclick="shareData()">🔗 ውጤቱን አጋራ (Share)</button>
        <button class="btn-main print-btn" onclick="window.print()">🖨️ ውጤቱን አትም (Print)</button>
    </div>
</div>

<script>
    let timerInterval;
    let seconds = 0;
    const pointsPerQuestion = 5; // ለእያንዳንዱ ትክክል መልስ የሚሰጥ ነጥብ

    // ሰንጠረዡን መፍጠር
    const tbody = document.getElementById('tableBody');
    for (let i = 1; i <= 6; i++) {
        let row = `<tr>
            <td>${i}</td>
            <td><input type="text" placeholder="ስም" style="width:95%" onkeypress="startTimer()"></td>
            ${generateButtons()} ${generateButtons()} ${generateButtons()} ${generateButtons()}
            <td class="total" style="font-weight:bold; font-size:16px;">0</td>
        </tr>`;
        tbody.innerHTML += row;
    }

    function generateButtons() {
        return `
            <td>
                <button class="btn-check" onclick="toggleScore(this, 'right')">✓</button>
                <button class="btn-check" onclick="toggleScore(this, 'wrong')">X</button>
            </td>`;
    }

    function toggleScore(btn, type) {
        const parent = btn.parentElement;
        const buttons = parent.querySelectorAll('.btn-check');
        
        buttons.forEach(b => b.classList.remove('active-right', 'active-wrong'));
        
        if (type === 'right') {
            btn.classList.add('active-right');
        } else {
            btn.classList.add('active-wrong');
        }
        calculateTotal();
    }

    function calculateTotal() {
        const rows = document.querySelectorAll("#tableBody tr");
        rows.forEach(row => {
            const rights = row.querySelectorAll('.active-right').length;
            row.querySelector('.total').innerText = rights * pointsPerQuestion;
        });
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            document.getElementById('timer').innerText = 
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function saveData() {
        alert("የውድድሩ ውጤት በኮምፒውተርዎ ላይ ለጊዜው ተቀምጧል!");
    }

    function shareData() {
        let text = "የጥያቄና መልስ ውድድር ውጤት:\n";
        document.querySelectorAll("#tableBody tr").forEach(row => {
            let name = row.querySelector('input').value || "ያልታወቀ";
            let total = row.querySelector('.total').innerText;
            text += `${name}: ${total} ነጥብ\n`;
        });
        
        if (navigator.share) {
            navigator.share({ title: 'የውድድር ውጤት', text: text });
        } else {
            navigator.clipboard.writeText(text);
            alert("ውጤቱ ተገልብጧል (Copied)! አሁን በዋትሳፕ ወይም በኢሜል 'Paste' ማድረግ ይችላሉ።");
        }
    }
</script>

</body>
</html>
