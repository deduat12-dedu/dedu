<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የጥያቄና መልስ ውጤት መያዣ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction: rtl; text-align: right; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .info-section { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #34495e; color: white; }
        input[type="number"], input[type="text"] { width: 90%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-group { margin-top: 20px; text-align: center; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; font-size: 16px; }
        .save-btn { background-color: #27ae60; color: white; }
        .print-btn { background-color: #2980b9; color: white; }
        @media print { .btn-group, select { display: none; } body { background: white; } }
    </style>
</head>
<body dir="ltr" style="text-align: left;">

<div class="container">
    <h2>የጥያቄና መልስ ውጤት መያዣ</h2>
    
    <div class="info-section">
        <div>
            <strong>ቀን፡</strong> 22/3/2026 <br>
            <strong>ሰዓት፡</strong> 5:18 PM
        </div>
        <div>
            <strong>ክፍል፡</strong> 
            <select>
                <option>1ኛ ሀ</option><option>1ኛ ለ</option>
                <option>2ኛ ሀ</option><option>2ኛ ለ</option>
                <option>3ኛ ሀ</option><option>4ኛ ሀ</option>
                <option>5ኛ ሀ</option><option>6ኛ ሀ</option>
            </select>
        </div>
        <div>
            <strong>ሴሚስተር፡</strong> 
            <select><option>1ኛ</option><option>2ኛ</option></select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ተ.ቁ</th>
                <th>ተማሪ ስም</th>
                <th>አማርኛ</th>
                <th>እንግሊዝኛ</th>
                <th>ሒሳብ</th>
                <th>አ/ሳይንስ</th>
                <th>ግብረገብ</th>
                <th>ድምር</th>
            </tr>
        </thead>
        <tbody id="scoreTable">
            <!-- 6 ተማሪዎች -->
            <script>
                for(let i=1; i<=6; i++) {
                    document.write(`
                        <tr>
                            <td>${i}</td>
                            <td><input type="text" placeholder="ስም"></td>
                            <td><input type="number" class="score" oninput="calculate()"></td>
                            <td><input type="number" class="score" oninput="calculate()"></td>
                            <td><input type="number" class="score" oninput="calculate()"></td>
                            <td><input type="number" class="score" oninput="calculate()"></td>
                            <td><input type="number" class="score" oninput="calculate()"></td>
                            <td class="total">0</td>
                        </tr>
                    `);
                }
            </script>
        </tbody>
    </table>

    <div style="margin-top: 30px;">
        <p><strong>1ኛ ዳኛ፡</strong> 
            <select id="judge1">
                <option>--- ምረጥ ---</option>
                <option>መ/ር ዳዊት የማነ</option><option>መ/ር ደለለኝ አጥላው</option>
                <option>መ/ርት መሰረት ፋንታ</option><option>መ/ር ባየልኝ አይተንፍሱ</option>
            </select>
        </p>
        <p><strong>2ኛ ዳኛ፡</strong> 
            <select id="judge2">
                <option>--- ምረጥ ---</option>
                <option>መ/ር ዳዊት የማነ</option><option>መ/ር ደለለኝ አጥላው</option>
                <option>መ/ርት መሰረት ፋንታ</option>
            </select>
        </p>
        <p><strong>ሰብሳቢ፡</strong> መ/ር ደለለኝ አጥላው | <strong>ፀሀፊ፡</strong> መ/ርት መሰረት ፋንታ</p>
        <p><strong>ፊርማ፡</strong> _________________</p>
    </div>

    <div class="btn-group">
        <button class="save-btn" onclick="alert('ውጤቱ ተመዝግቧል!')">💾 ውጤቱን መዝግብ</button>
        <button class="print-btn" onclick="window.print()">🖨️ ውጤቱን አትም</button>
    </div>
</div>

<script>
    function calculate() {
        let rows = document.querySelectorAll("#scoreTable tr");
        rows.forEach(row => {
            let scores = row.querySelectorAll(".score");
            let total = 0;
            scores.forEach(s => total += Number(s.value) || 0);
            row.querySelector(".total").innerText = total;
        });
    }
</script>

</body>
</html>
