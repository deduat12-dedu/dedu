<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>የጥያቄና መልስ ውድድር ውጤት መያዣ - Log In</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f0f2f5;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Log In Form Style */
        #login-container { background: white; padding: 45px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 380px; border: 1px solid #ddd; }
        #login-container h2 { color: var(--primary); margin-bottom: 25px; font-size: 24px; }
        .login-input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        .login-input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(26,42,108,0.2); }
        .login-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .login-btn:hover { background: #121d4d; transform: translateY(-2px); }
        
        /* Main Application Style (Hidden by default) */
        #main-app { display: none; width: 95%; max-width: 1250px; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); margin: 25px; }
        
        .top-info { display: flex; justify-content: space-between; background: #f8f9fa; padding: 25px; border-radius: 18px; margin-bottom: 30px; border: 1px solid #eee; }
        .input-field { padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; outline: none; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 15px; overflow: hidden; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: #2c3e50; color: white; font-size: 13px; text-transform: uppercase; }

        /* የራይጥ እና ኤክስ ሰፊ ሳጥን */
        .check-box { cursor: pointer; font-weight: bold; font-size: 26px; height: 55px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 10px; transition: 0.2s; border: 1px solid #f0f0f0; }
        .check-box:hover { background: #f1f3f5; transform: scale(1.03); }
        .correct { color: var(--success); background: #e8f5e9 !important; border-color: #c8e6c9; }
        .wrong { color: var(--danger); background: #ffebee !important; border-color: #ffcdd2; }

        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 35px; }
        button.action-btn { padding: 15px 35px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .save-btn { background: var(--success); color: white; }
        .print-btn { background: #34495e; color: white; }
        .next-btn { background: #f39c12; color: white; }
        
        #archiveSection { margin-top: 40px; border-top: 3px solid var(--primary); padding-top: 25px; }

        @media print { .btn-container, #login-container, select, input, .next-btn, #logout-btn { display: none; } body { display: block; } .main-card { box-shadow: none; border: none; } }
    </style>
</head>
<body>

<!-- መግቢያ ገጽ -->
<div id="login-container">
    <h2>የውድድር መግቢያ (Log In)</h2>
    <input type="text" id="username" class="login-input" placeholder="የተጠቃሚ ስም (Username)">
    <input type="password" id="password" class="login-input" placeholder="የይለፍ ቃል (Password)">
    <p id="error-msg" style="color:red; font-size:14px; display:none; margin-bottom: 10px;">የገቡት መረጃ ተሳስቷል!</p>
    <button class="login-btn" onclick="checkLogin()">ግባ</button>
</div>

<!-- ዋናው መተግበሪያ -->
<div id="main-app">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--primary); margin: 0;">የጥያቄና መልስ ውድድር ውጤት መያዣ ቅፅ</h2>
        <button id="logout-btn" onclick="location.reload()" style="background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">ውጣ (Logout)</button>
    </div>
    
    <div class="top-info">
        <div>ቀን፡ <input type="date" id="dateInput" class="input-field"></div>
        <div>ክፍል፡ 
            <select id="grade" class="input-field">
                <option>1ኛሀ</option><option>1ኛለ</option><option>2ኛሀ</option><option>2ኛለ</option>
                <option>3ኛሀ</option><option>4ኛሀ</option><option>5ኛሀ</option><option>6ኛሀ</option>
            </select>
        </div>
        <div>ሴሚስተር፡ 
            <select id="semester" class="input-field">
                <option value="1ኛ">1ኛ ሴሚስተር</option>
                <option value="2ኛ" selected>2ኛ ሴሚስተር</option>
            </select>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2" style="width: 45px;">ተ.ቁ</th>
                <th rowspan="2" style="width: 220px;">የተወዳዳሪዎች ስም</th>
                <th colspan="2">አማርኛ</th><th colspan="2">ኢንግሊዝኛ</th><th colspan="2">ሒሳብ</th><th colspan="2">አ/ሳይንስ</th><th colspan="2">ግብረገብ</th>
                <th rowspan="2">✓</th><th rowspan="2">X</th><th rowspan="2">ድምር</th><th rowspan="2">ደረጃ</th>
            </tr>
            <tr>
                <th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th><th>1ኛ</th><th>2ኛ</th>
            </tr>
        </thead>
        <tbody id="quizRows"></tbody>
    </table>

    <div class="btn-container">
        <button class="action-btn save-btn" onclick="archiveResults()">💾 ውጤቱን መዝግብ (Save Result)</button>
        <button class="action-btn print-btn" onclick="window.print()">🖨️ ውጤቱን አትም (Print)</button>
        <button class="action-btn next-btn" onclick="setupRows()">➕ አዲስ ውድድር (Next)</button>
    </div>

    <div id="archiveSection" style="display:none;">
        <h3 style="color: var(--primary);">የተመዘገቡ ውጤቶች ታሪክ</h3>
        <table style="background:#fdfdfd;">
            <thead style="background:var(--primary);"><tr><th>ክፍል</th><th>ሴሚስተር</th><th>የተማሪ ስም</th><th>ውጤት</th><th>ደረጃ</th></tr></thead>
            <tbody id="archiveBody"></tbody>
        </table>
    </div>

    <div style="display: flex; justify-content: space-between; margin-top: 50px; padding: 25px; background: #f9f9f9; border-radius: 20px; border: 1px solid #eee;">
        <div>
            <h4 style="color: var(--primary); margin-top:0;">የውድድሩ ዳኞች</h4>
            1ኛ፡ ______________<br><br>2ኛ፡ ______________
        </div>
        <div style="text-align: right;">
            <h4 style="color: var(--primary); margin-top:0;">አወዳዳሪ ኮሚቴዎች</h4>
            <p>ሰብሳቢ፡ <b>መ/ር ደለለኝ አጥላው</b></p>
            <p>ፀሀፊ፡ <b>መ/ርት መሰረት ፋንታ</b></p>
        </div>
    </div>
</div>

<script>
    // የመግቢያ ተግባር (Log In)
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // የተቀየረ ስም እና ሚስጥራዊ ቁጥር
        if(user === "Delu" && pass === "1221") {
            document.getElementById('login-container').style.display = "none";
            document.getElementById('main-app').style.display = "block";
            document.body.style.display = "block"; 
            setupRows();
        } else {
            document.getElementById('error-msg').style.display = "block";
        }
    }

    // ሰንጠረዡን የማዘጋጀት ተግባር
    function setupRows() {
        const tbody = document.getElementById('quizRows');
        tbody.innerHTML = "";
        for (let i = 1; i <= 6; i++) {
            tbody.innerHTML += `
                <tr id="r-${i}">
                    <td>${i}</td>
                    <td><input type="text" class="input-field" style="width:90%;" placeholder="ስም ያስገቡ..." oninput="rankAll()"></td>
                    ${Array(10).fill().map(() => `<td><div class="check-box" onclick="toggle(this, ${i})">-</div></td>`).join('')}
                    <td id="c-${i}" style="color:green; font-weight:bold;">0</td>
                    <td id="w-${i}" style="color:red; font-weight:bold;">0</td>
                    <td id="t-${i}" style="font-weight:bold;">0/10</td>
                    <td id="rank-${i}" style="color:blue; font-weight:900;">-</td>
                </tr>`;
        }
        document.getElementById('dateInput').valueAsDate = new Date();
    }

    // የራይጥ እና ኤክስ ተግባር
    function toggle(el, id) {
        if (el.innerText === "-") { el.innerText = "✓"; el.className = "check-box correct"; }
        else if (el.innerText === "✓") { el.innerText = "X"; el.className = "check-box wrong"; }
        else { el.innerText = "-"; el.className = "check-box"; }
        
        let row = document.getElementById(`r-${id}`);
        let boxes = row.querySelectorAll('.check-box');
        let c = 0, w = 0;
        boxes.forEach(b => { 
            if(b.innerText === "✓") c++; 
            if(b.innerText === "X") w++;
        });
        
        document.getElementById(`c-${id}`).innerText = c;
        document.getElementById(`w-${id}`).innerText = w;
        document.getElementById(`t-${id}`).innerText = c + "/10";
        rankAll();
    }

    // ደረጃን በራሱ የማስላት ተግባር
    function rankAll() {
        let scores = [];
        for (let i = 1; i <= 6; i++) {
            let s = parseInt(document.getElementById(`c-${i}`).innerText);
            let n = document.getElementById(`r-${i}`).querySelector('input').value;
            scores.push({ id: i, score: s, active: n.trim() !== "" || s > 0 });
        }
        let sorted = [...scores].filter(x => x.active).sort((a,b) => b.score - a.score);
        scores.forEach(s => {
            if(s.active) {
                let r = sorted.findIndex(x => x.score === s.score) + 1;
                document.getElementById(`rank-${s.id}`).innerText = r + "ኛ";
            } else {
                document.getElementById(`rank-${s.id}`).innerText = "-";
            }
        });
    }

    // ውጤትን ወደ ታሪክ የመመዝገብ ተግባር
    function archiveResults() {
        const archiveBody = document.getElementById('archiveBody');
        const grade = document.
